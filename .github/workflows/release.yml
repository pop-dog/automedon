name: release

# Publishes the prebuilt binaries that install.sh downloads. The release asset
# names (automedon-<version>-<os>-<arch>.tar.gz plus checksums.sha256) must match
# exactly what install.sh requests.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - label: darwin-aarch64
            os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # The aarch64 Linux target is cross-compiled from an x86_64 runner, so it
      # needs a matching linker.
      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p orchestrator --target ${{ matrix.target }}

      - name: Package archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="automedon-${version}-${{ matrix.label }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" automedon
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ARCHIVE }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum automedon-*.tar.gz > checksums.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/automedon-*.tar.gz
            dist/checksums.sha256
