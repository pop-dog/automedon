name: release

# Publishes the prebuilt binaries that install.sh downloads. The release asset
# names (automedon-<version>-<os>-<arch>.tar.gz plus checksums.sha256) must match
# exactly what install.sh requests.
on:
  push:
    tags:
      - "v*"
  # Manual trigger to exercise the build matrix (including the cross-compiled
  # aarch64 leg) without publishing a release. The publish job only runs for
  # tag pushes, so a dispatched run builds and uploads artifacts only.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux binaries target musl and link statically. Building against
          # glibc ties the binary to a minimum glibc version (the build host's),
          # and glibc is not forward compatible, so a glibc build fails to start
          # on any host with an older glibc (e.g. Amazon Linux 2). A static musl
          # binary carries its own libc and runs regardless of the host's.
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - label: darwin-aarch64
            os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # cargo-zigbuild uses Zig as the linker so both musl targets, including
      # the cross-compiled aarch64 one, link from a stock x86_64 runner without
      # a separate musl cross-toolchain. Both tools install as prebuilt
      # binaries, so there is no compile step.
      - name: Install Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binary (Linux, static musl)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release -p orchestrator --target ${{ matrix.target }}

      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release -p orchestrator --target ${{ matrix.target }}

      - name: Package archive
        run: |
          # Tag pushes name the archive after the release version (vX.Y.Z ->
          # X.Y.Z). A manual workflow_dispatch has no tag, and a branch name may
          # contain a slash that is invalid in the archive path, so fall back to
          # the short commit SHA for those build-only runs.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${GITHUB_SHA:0:7}"
          fi
          archive="automedon-${version}-${{ matrix.label }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" automedon
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ARCHIVE }}

  release:
    name: publish release
    needs: build
    # Only publish for tag pushes. A manual workflow_dispatch run stops after
    # the build job so it can test the matrix without cutting a release.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum automedon-*.tar.gz > checksums.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/automedon-*.tar.gz
            dist/checksums.sha256
