# The agentic coder: a Composite `develop -> commit` Workflow whose leaf Steps
# are bespoke LLM agents (`claude -p`). The entry Message is the path to a
# TASK.md file; each Step re-emits that path on stdout so it propagates to its
# successor. Only the small path rides the Message channel — the edits live in the
# working directory; orchestration scratch (the review findings, the build/test
# failure) lives in the ephemeral Run Directory ($AUTOMEDON_RUN_DIR).
#
#   Run (cwd = the repo to work on):
#     orchestrator /path/to/examples/coder.yaml --message ./TASK.md
#
# Each Step names its script via $AUTOMEDON_WORKFLOW_DIR — the directory of this file, set
# by the orchestrator — so the scripts are found no matter the cwd. The Steps read
# TASK.md from the cwd (the repo being worked on) and edit it there, but write
# orchestration scratch (FINDINGS.md, BUILD_FAILURE.md) into $AUTOMEDON_RUN_DIR — the
# ephemeral per-Run directory the engine provides — so the repo stays a pure
# deliverable. They also expect `claude`, and (for the build check) `cargo`, on
# PATH.
#
# Structure: the top-level `coder` Workflow is `develop -> commit`, where
# `develop` is a Composite Step running the `develop` sub-Workflow — the
# `code <-> review` loop. The build/test gate lives in `code` (the only Step that
# can act on a failure by editing), so `develop` only ever surfaces green,
# reviewed code; `commit` need not re-verify it. The `develop` loop is bounded by
# `code`'s Budget: if review still reports Blocking findings when that Budget is
# spent, the child's EXHAUSTED Gate exits 90, which surfaces to the parent and
# escalates the Run (the reserved "escalate to user" code), leaving the unstaged
# changes and the findings file in place for a human. Un-approved code is never
# committed.

# The top-level surface is a registry: a `root:` Workflow id plus a `workflows:`
# map. A Composite Step's `workflow:` names another entry in this map.
root: coder

workflows:
  coder:
    entry: develop

    steps:
      develop:
        # Composite Step: run the `develop` sub-Workflow (code <-> review) to its
        # Exit Gate. Its surfaced exit code routes here exactly as a leaf Step's
        # would — 0 means reviewed, green code ready to commit.
        workflow: develop
        budget: 1
        gates:
          - key: 0
            target: { step: commit }
            when: code reviewed clean and green — hand off to commit
          - key: "*"
            target: { exit: 90 }
            when: develop escalated (build failed or review did not converge) — escalate

      commit:
        # Writes a commit message from `git diff` + TASK.md and commits on the
        # current branch. Never pushes. The diff it commits is the exact tree the
        # `code` Step already built and tested, so it does not re-verify.
        command: "$AUTOMEDON_WORKFLOW_DIR/coder/commit.sh"
        env:
          model: haiku
        budget: 1
        gates:
          - key: 0
            target: { exit: 0 }
            when: committed on the current branch — done
          - key: "*"
            target: { exit: 90 }
            when: the commit failed — escalate

  develop:
    entry: code
    default_budget: 10

    steps:
      code:
        # Purely the coding agent: reads TASK.md (and the deterministic Steps'
        # feedback files on loop-back), edits files, and leaves changes unstaged.
        # The build/test gate is the separate `build-test` Step, so `code` exits 0
        # once the agent finishes and non-zero only if the agent itself failed.
        # The single re-entry point of the loop: both a red build and a Blocking
        # review route back here, sharing this Budget.
        command: "$AUTOMEDON_WORKFLOW_DIR/coder/code.sh"
        env:
          model: sonnet
        budget: 3
        gates:
          - key: 0
            target: { step: build-test }
            when: the coding agent finished — verify the build
          - key: "*"
            target: { exit: 90 }
            when: the coding agent itself failed to run — escalate
          - key: EXHAUSTED
            target: { exit: 90 }
            when: code did not converge within the Budget — escalate

      build-test:
        # Deterministic, LLM-free checkpoint: build the project and run all tests.
        # Green hands off to review; red loops back to code with the failure in
        # $AUTOMEDON_RUN_DIR/BUILD_FAILURE.md. The loop is bounded by code's Budget (its re-entry),
        # so this Step needs no Exhaustion handling of its own.
        command: "$AUTOMEDON_WORKFLOW_DIR/coder/build-test.sh"
        gates:
          - key: 0
            target: { step: review }
            when: the build is green and tests pass — hand off for review
          - key: "*"
            target: { step: code }
            when: the build or tests failed — send back to fix

      review:
        # Wraps the /code-review skill: writes findings to the shared findings
        # file, categorised Blocking vs Suggestion, and re-emits the TASK.md path.
        # On approval it traverses the sub-Workflow's Exit Gate, surfacing exit 0
        # to the parent `develop` Step, which routes on to commit.
        command: "$AUTOMEDON_WORKFLOW_DIR/coder/review.sh"
        env:
          model: opus
        gates:
          - key: 0
            target: { exit: 0 }
            when: no Blocking findings — approve and surface to the parent
          - key: 1
            target: { step: code }
            when: Blocking findings remain — send back to revise
          - key: "*"
            target: { exit: 90 }
            when: the review agent failed unexpectedly — escalate
