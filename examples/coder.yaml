# The agentic coder: a flat `code -> review -> commit` Workflow whose three Steps
# are bespoke LLM agents (`claude -p`). The entry Message is the path to a
# TASK.md file; each Step re-emits that path on stdout so it propagates to its
# successor. Only the small path rides the Message channel — the bulk (the task
# text, the edits, the review findings) lives in the working directory.
#
#   Run (cwd = the repo to work on):
#     orchestrator /path/to/examples/coder.yaml --message ./TASK.md
#
# Each Step names its script via $WORKFLOW_DIR — the directory of this file, set
# by the orchestrator — so the scripts are found no matter the cwd. The Steps
# read TASK.md and write FINDINGS.md into the cwd (the repo being worked on), so
# the cwd is left as that repo. They also expect `claude`, and (for the build
# check) `cargo`, on PATH.
#
# The code <-> review loop is bounded by `code`'s Budget. If review still reports
# Blocking findings when that Budget is spent, the EXHAUSTED Gate escalates with
# EXIT 90 (the reserved "escalate to user" code), leaving the unstaged changes
# and the findings file in place for a human. Un-approved code is never committed.

# The top-level surface is a registry: a `root:` Workflow id plus a `workflows:`
# map. This Workflow is flat (no Composite Steps), so the map holds one entry.
root: coder

workflows:
  coder:
    entry: code
    default_budget: 10

    steps:
      code:
        # Reads TASK.md (and the findings file on loop-back), edits files, and
        # runs its own build + test loop until green. Leaves changes unstaged.
        # Re-emits the TASK.md path as its out-Message.
        command: "$WORKFLOW_DIR/coder/code.sh"
        budget: 3
        gates:
          - key: 0
            target: { step: review }
            when: code builds and tests pass — hand off for review
          - key: "*"
            target: { exit: 90 }
            when: the coding agent could not produce a green build — escalate
          - key: EXHAUSTED
            target: { exit: 90 }
            when: code and review did not converge within the Budget — escalate

      review:
        # Wraps the /code-review skill: writes findings to the shared findings
        # file, categorised Blocking vs Suggestion, and re-emits the TASK.md path.
        command: "$WORKFLOW_DIR/coder/review.sh"
        gates:
          - key: 0
            target: { step: commit }
            when: no Blocking findings — approve
          - key: 1
            target: { step: code }
            when: Blocking findings remain — send back to revise
          - key: "*"
            target: { exit: 90 }
            when: the review agent failed unexpectedly — escalate

      commit:
        # Writes a commit message from `git diff` + TASK.md and commits on the
        # current branch. Never pushes.
        command: "$WORKFLOW_DIR/coder/commit.sh"
        budget: 1
        gates:
          - key: 0
            target: { exit: 0 }
            when: committed on the current branch — done
          - key: "*"
            target: { exit: 90 }
            when: the commit failed — escalate
